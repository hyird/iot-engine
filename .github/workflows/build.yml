name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMIT: 4bca8fd8654e5ba76f92661db7bfe954768ad8ef
  BUILD_TYPE: Debug
  BUN_VERSION: 1.3.14

jobs:
  ubuntu_build:
    name: Ubuntu build
    runs-on: ubuntu-24.04
    env:
      CC: gcc-13
      CXX: g++-13
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg/archives
    steps:
      - name: Checkout iot-engine
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 ninja-build curl zip unzip tar
          gcc-13 --version
          g++-13 --version

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-binaries-${{ runner.os }}-${{ runner.arch }}-gcc13-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'triplets/**', 'CMakeLists.txt') }}
          restore-keys: |
            vcpkg-binaries-${{ runner.os }}-${{ runner.arch }}-gcc13-${{ env.VCPKG_COMMIT }}-

      - name: Bootstrap vcpkg
        run: |
          set -euo pipefail
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          git init "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" remote add origin https://github.com/microsoft/vcpkg.git
          git -C "$VCPKG_ROOT" fetch --depth 1 origin "$VCPKG_COMMIT"
          git -C "$VCPKG_ROOT" checkout --detach FETCH_HEAD
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Configure
        run: |
          cmake -S . -B build/ci -G Ninja \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DCMAKE_COMPILE_WARNING_AS_ERROR=ON \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Save vcpkg binary cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build
        run: cmake --build build/ci --config "$BUILD_TYPE"

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure --build-config "$BUILD_TYPE"

  macos_build:
    name: macOS build
    runs-on: macos-15
    env:
      CC: /usr/bin/clang
      CXX: /usr/bin/clang++
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg/archives
    steps:
      - name: Checkout iot-engine
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install build tools
        run: |
          brew install ninja
          /usr/bin/clang++ --version

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-binaries-${{ runner.os }}-${{ runner.arch }}-appleclang-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'triplets/**', 'CMakeLists.txt') }}
          restore-keys: |
            vcpkg-binaries-${{ runner.os }}-${{ runner.arch }}-appleclang-${{ env.VCPKG_COMMIT }}-

      - name: Bootstrap vcpkg
        run: |
          set -euo pipefail
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          git init "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" remote add origin https://github.com/microsoft/vcpkg.git
          git -C "$VCPKG_ROOT" fetch --depth 1 origin "$VCPKG_COMMIT"
          git -C "$VCPKG_ROOT" checkout --detach FETCH_HEAD
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Configure
        run: |
          cmake -S . -B build/ci -G Ninja \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DCMAKE_COMPILE_WARNING_AS_ERROR=ON \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Save vcpkg binary cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build
        run: cmake --build build/ci --config "$BUILD_TYPE"

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure --build-config "$BUILD_TYPE"

  windows_build:
    name: Windows build
    runs-on: windows-2025
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.cache\vcpkg\archives
    steps:
      - name: Checkout iot-engine
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Set up MSYS2 UCRT64 GCC
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: git
          pacboy: >-
            toolchain:p
            cmake:p
            ninja:p

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-binaries-${{ runner.os }}-${{ runner.arch }}-ucrt64-gcc-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'triplets/**', 'CMakeLists.txt') }}
          restore-keys: |
            vcpkg-binaries-${{ runner.os }}-${{ runner.arch }}-ucrt64-gcc-${{ env.VCPKG_COMMIT }}-

      - name: Bootstrap vcpkg
        shell: msys2 {0}
        run: |
          set -euo pipefail
          vcpkg_root_msys="$(cygpath -u "$VCPKG_ROOT")"
          mkdir -p "$(cygpath -u "$VCPKG_DEFAULT_BINARY_CACHE")"
          git init "$vcpkg_root_msys"
          git -C "$vcpkg_root_msys" remote add origin https://github.com/microsoft/vcpkg.git
          git -C "$vcpkg_root_msys" fetch --depth 1 origin "$VCPKG_COMMIT"
          git -C "$vcpkg_root_msys" checkout --detach FETCH_HEAD
          cmd.exe //c "$(cygpath -w "$vcpkg_root_msys/bootstrap-vcpkg.bat") -disableMetrics"

      - name: Configure
        shell: msys2 {0}
        run: |
          vcpkg_root_msys="$(cygpath -u "$VCPKG_ROOT")"
          gcc --version
          g++ --version
          cmake -S . -B build/ci -G Ninja \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DCMAKE_COMPILE_WARNING_AS_ERROR=ON \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DVCPKG_TARGET_TRIPLET=x64-mingw-static \
            -DVCPKG_HOST_TRIPLET=x64-mingw-static \
            -DCMAKE_TOOLCHAIN_FILE="$vcpkg_root_msys/scripts/buildsystems/vcpkg.cmake"

      - name: Save vcpkg binary cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build
        shell: msys2 {0}
        run: cmake --build build/ci --config "$BUILD_TYPE"

      - name: Test
        shell: msys2 {0}
        run: ctest --test-dir build/ci --output-on-failure --build-config "$BUILD_TYPE"
